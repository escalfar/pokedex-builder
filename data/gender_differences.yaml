# PokéAPI represents these genders as separate varieties. They are normalized
# into the project's gender dimension so their IDs use FORM_FEMALE/FORM_MALE.
source_gender_varieties:
  unfezant-female: {gender: female, form_slug: normal}
  unfezant-male: {gender: male, form_slug: normal}
  frillish-female: {gender: female, form_slug: normal}
  # PokéAPI uses the base/default variety name for these male forms.
