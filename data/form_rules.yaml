version: "1.0"

exclude:
  exact_slugs:
    - ash
    - battle-bond
    - blade
    - busted
    - complete
    - crowned
    - dusk-mane
    - eternamax
    - galar-zen
    - gulping
    - hangry
    - hero
    - ice-rider
    - low-key-gmax
    - mega
    - mega-x
    - mega-y
    - noice
    - original-color
    - partner
    - primal
    - school
    - shadow-rider
    - solo
    - starter
    - sunshine
    - ten-percent
    - ultra
    - zen
    - gorging

  slug_prefixes:
    - gmax
    - mega
    - pikachu-cap
    - pikachu-cosplay
    - pikachu-rock-star
    - pikachu-belle
    - pikachu-pop-star
    - pikachu-phd
    - pikachu-libre

  slug_suffixes:
    - gmax
    - mega
    - mega-x
    - mega-y
    - cap

  api_name_contains:
    - "-gmax"
    - "-mega"
    - "-totem"
    - "-cap"
    - "-cosplay"
    - "-starter"

  species_single_row:
    - arceus
    - dialga
    - genesect
    - giratina
    - minior
    - ogerpon
    - palkia
    - silvally
    - terapagos

  excluded_api_names:
    # Forms that Pokémon HOME cannot store as independent catalog entries.
    - pikachu-belle
    - pikachu-libre
    - pikachu-phd
    - pikachu-pop-star
    - pikachu-rock-star
    - castform-rainy
    - castform-snowy
    - castform-sunny
    - kyurem-black
    - kyurem-white
    - meloetta-pirouette
    - necrozma-dawn
    - necrozma-dusk
    - calyrex-ice
    - calyrex-shadow
    - koraidon-gliding-build
    - koraidon-limited-build
    - koraidon-sprinting-build
    - koraidon-swimming-build
    - miraidon-aquatic-mode
    - miraidon-drive-mode
    - miraidon-glide-mode
    - miraidon-low-power-mode
    - darmanitan-galar-zen
    - greninja-battle-bond
    - greninja-ash
    - pikachu-partner
    - eevee-partner
