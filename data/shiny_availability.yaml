version: "1.1"

# The catalog is completed in small, audited tranches. Unlisted variants remain
# unknown until a later batch classifies them explicitly.
complete: false

# Batch 12: Kanto species except Mew.
# Every retained HOME variant whose National Dex number is 001-150 has a
# permanent, non-event shiny acquisition method. Pokémon GO is ignored when a
# supported core game already provides such a method. The three shiny Galarian
# legendary birds are the documented exception because GO is currently their
# only permanent, non-event legitimate source:
#   00144_GALAR_NONE, 00145_GALAR_NONE, 00146_GALAR_NONE.
national_dex: []
national_dex_ranges:
  - [1, 150]

  # Batch 13: Johto. Every retained HOME variant with Nat Dex 152-251
  # has a legitimate non-event shiny method. This includes later regional
  # variants such as Hisuian Typhlosion, Hisuian Qwilfish, Hisuian Sneasel,
  # Galarian Corsola, Galarian Slowking, and Paldean Wooper.
  #
  # Celebi is the special case in this tranche: it is obtainable shiny only
  # from the in-game GS Ball encounter in the Nintendo 3DS Virtual Console
  # release of Pokémon Crystal. The method is not a distribution event, but it
  # now requires a legacy installation of Crystal and access to Pokémon Bank
  # to move the result forward into Pokémon HOME. Pokémon GO is therefore not
  # used for Celebi under the project's source-priority rule.
  - [152, 251]

  # Batch 14: Hoenn. Every retained HOME variant with Nat Dex 252-386
  # has a legitimate non-event shiny method. This includes later regional
  # variants associated with Hoenn species, such as Galarian Zigzagoon and
  # Galarian Linoone.
  #
  # Jirachi is obtainable shiny through the North American Pokémon Colosseum
  # Bonus Disc or Pokémon Channel. These are legacy game-based distributions,
  # not limited-time Mystery Gift events. Pokémon GO is not used.
  #
  # Deoxys is permanently shiny-huntable through the AuroraTicket encounter in
  # the Nintendo Switch re-releases of Pokémon FireRed and LeafGreen. The caught
  # shiny can be changed among Normal, Attack, Defense, and Speed Formes in later
  # compatible games, so all retained Deoxys forms are covered.
  # Pokémon GO is not used.
  - [252, 386]


  # Batch 15: Sinnoh. Retained HOME variants with Nat Dex 387-493 are
  # classified here. Most species have permanent shiny methods in supported
  # core games. The special cases are documented below.
  #
  # Manaphy is obtainable shiny as a permanent Pokémon HOME gift for completing
  # the Sinnoh Pokédex from Brilliant Diamond and Shining Pearl. Phione remains
  # covered because it can be bred from Manaphy in compatible games.
  #
  # Arceus is permanently shiny-huntable in Brilliant Diamond and Shining Pearl
  # through the Hall of Origin encounter after meeting the Pokémon Legends:
  # Arceus save-data and progression requirements.
  #
  # Darkrai and both Shaymin forms are excluded below. Their legitimate shiny
  # methods depend on limited-time event items or event-style Pokémon GO access,
  # so they do not satisfy the project's non-event rule.
  - [387, 493]

# Use form-level inclusions only when a species-wide rule would be too broad.
home_ids: []

excluded_home_ids:
  # Shiny Mew has only been obtainable through event-limited distributions or
  # event/ticket research. It therefore does not satisfy the project rule.
  - "00151_NORMAL_NONE"

  # Darkrai requires a limited-time Member Card encounter or rotating/event
  # Pokémon GO access. Neither is a permanent non-event method.
  - "00491_NORMAL_NONE"

  # Shaymin requires the limited-time Oak's Letter encounter or event-style
  # Pokémon GO research. Both retained forms therefore remain unavailable.
  - "00492_NORMAL_NONE"
  - "00492_SKY_NONE"
