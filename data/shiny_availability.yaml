  - "01007_NORMAL_NONE"
  - "01007_GLIDING_BUILD_NONE"
  - "01007_LIMITED_BUILD_NONE"
  - "01007_SPRINTING_BUILD_NONE"
  - "01007_SWIMMING_BUILD_NONE"
